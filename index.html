        );

        const ModeCard = ({ title, desc, icon, color, onClick }) => (
            <button onClick={onClick} className={`p-5 rounded-3xl text-left transition-all flex items-center gap-5 group bg-slate-100/70 dark:bg-slate-800/70 backdrop-blur-xl border border-slate-200 dark:border-slate-700 hover:border-slate-400 dark:hover:border-slate-500`}>
                <div className={`w-14 h-14 rounded-2xl bg-${color}-500/10 text-${color}-500 flex items-center justify-center text-2xl group-hover:scale-110 transition-transform shadow-xl shadow-black/20`}>
                    <i className={`fas ${icon}`}></i>
                </div>
                <div>
                    <h3 className="font-bold text-lg leading-tight uppercase tracking-tighter">{title}</h3>
                    <p className="text-xs text-slate-500 dark:text-slate-400">{desc}</p>
                </div>
                <div className="ml-auto text-slate-400 dark:text-slate-700 group-hover:text-slate-500 dark:group-hover:text-slate-400">
                    <i className="fas fa-chevron-right"></i>
                </div>
            </button>
        );

        const DifficultySelect = ({ onSelectDifficulty }) => (
            <div className="animate-in fade-in slide-in-from-right-4 duration-500 space-y-6">
                <h2 className="text-2xl font-black mb-6 flex items-center gap-3 uppercase tracking-tighter">
                    <i className="fas fa-tachometer-alt text-red-500"></i>
                    Select Intensity
                </h2>
                <div className="grid gap-4">
                    {DIFFICULTIES.map((diff) => (
                        <button
                            key={diff.id}
                            onClick={() => onSelectDifficulty(diff)}
                            className="p-6 rounded-[2rem] text-left transition-all border-l-8 flex justify-between items-center group shadow-xl bg-slate-100/70 dark:bg-slate-800/70 backdrop-blur-xl border-slate-200 dark:border-slate-800 hover:border-red-500"
                        >
                            <div>
                                <span className="font-black text-xl block uppercase tracking-tighter">{diff.name}</span>
                                <span className="text-xs text-slate-500 dark:text-slate-400 uppercase font-bold tracking-widest">
                                    {diff.id === 'easy' ? 'Steady Pace' : diff.id === 'medium' ? 'Warehouse Speed' : 'Elite Reflexes'}
                                </span>
                            </div>
                            <div className="text-slate-400 dark:text-slate-700 font-black group-hover:text-red-500/50">
                                {diff.multiplier}x
                            </div>
                        </button>
                    ))}
                </div>
            </div>
        );

        const CategorySelect = ({ onSelectCategory }) => (
            <div className="animate-in fade-in slide-in-from-right-4 duration-500 pb-10">
                <h2 className="text-2xl font-black mb-6 flex items-center gap-3 uppercase tracking-tighter">
                    <i className="fas fa-map-marker-alt text-red-500"></i>
                    Choose Zone
                </h2>
                <div className="grid grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto pr-2">
                    {CATEGORIES.map((cat) => (
                        <button
                            key={cat}
                            onClick={() => onSelectCategory(cat)}
                            className="p-5 rounded-2xl text-left transition-all border-b-4 active:border-b-0 active:translate-y-1 bg-slate-100/70 dark:bg-slate-800/70 backdrop-blur-xl border-slate-300 dark:border-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700"
                        >
                            <span className="font-bold text-[13px] leading-tight block uppercase tracking-tighter">{cat}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        const MarathonSetup = ({ onStartMarathon }) => {
            const [numQuestions, setNumQuestions] = useState(25);
            const [difficulty, setDifficulty] = useState(DIFFICULTIES[1]);
            const [category, setCategory] = useState(CATEGORIES[0]);

            const handleStart = () => {
                onStartMarathon({ numQuestions, difficulty, category });
            };

            const questionOptions = [25, 50, 100];

            return (
                <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-8 pb-10">
                    <div>
                        <h2 className="text-2xl font-black mb-4 flex items-center gap-3 uppercase tracking-tighter">
                            <i className="fas fa-road text-purple-500"></i>
                            Marathon Setup
                        </h2>
                        <p className="text-sm text-slate-500 dark:text-slate-400">Configure your endurance drill.</p>
                    </div>

                    <div>
                        <h3 className="text-lg font-bold mb-3 uppercase tracking-wider text-slate-600 dark:text-slate-300">Questions</h3>
                        <div className="grid grid-cols-3 gap-3">
                            {questionOptions.map(num => (
                                <button key={num} onClick={() => setNumQuestions(num)} className={`p-4 rounded-2xl font-bold text-center transition-colors ${numQuestions === num ? 'coke-red text-white' : 'bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700'}`}>
                                    {num}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div>
                        <h3 className="text-lg font-bold mb-3 uppercase tracking-wider text-slate-600 dark:text-slate-300">Intensity</h3>
                        <div className="grid gap-4">
                            {DIFFICULTIES.map((diff) => (
                                <button key={diff.id} onClick={() => setDifficulty(diff)} className={`p-4 rounded-2xl text-left transition-all border-l-4 flex justify-between items-center group ${difficulty.id === diff.id ? 'border-red-500 bg-slate-200 dark:bg-slate-700' : 'border-transparent bg-slate-100/70 dark:bg-slate-800/70 hover:bg-slate-200 dark:hover:bg-slate-700'}`}>
                                    <div>
                                        <span className="font-black text-lg block uppercase tracking-tighter">{diff.name}</span>
                                    </div>
                                    <div className="font-black text-slate-500">{diff.multiplier}x</div>
                                </button>
                            ))}
                        </div>
                    </div>

                    <div>
                        <h3 className="text-lg font-bold mb-3 uppercase tracking-wider text-slate-600 dark:text-slate-300">Zone</h3>
                        <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full p-4 rounded-2xl bg-slate-200 dark:bg-slate-800 border-slate-300 dark:border-slate-700 border font-bold text-slate-800 dark:text-slate-200">
                            {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                        </select>
                    </div>

                    <button onClick={handleStart} className="w-full coke-red text-white p-5 rounded-[2rem] font-black text-xl shadow-xl shadow-red-500/20 hover:scale-[1.02] transition-transform">
                        START MARATHON
                    </button>
                </div>
            );
        };

        const Game = ({ type, category, difficulty, marathonSettings, onFinish, setScore, score, setTotal, total }) => {
            const filteredData = useMemo(() => {
                if (category === "All Products") return PRODUCT_DATA;
                return PRODUCT_DATA.filter(p => p.category === category);
            }, [category]);

            const [currentQ, setCurrentQ] = useState(null);
            const [options, setOptions] = useState([]);
            const [timeLeft, setTimeLeft] = useState(100);
            const [isAnswering, setIsAnswering] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [streak, setStreak] = useState(0);
            const [internalGameType, setInternalGameType] = useState(type === 'advanced' ? 'recognition' : type);

            const generateQuestion = () => {
                let currentQuestionType = type;
                if (type === 'advanced') {
                    const types = ['recognition', 'mastery', 'pallet'];
                    currentQuestionType = types[Math.floor(Math.random() * types.length)];
                    setInternalGameType(currentQuestionType);
                }

                const correct = filteredData[Math.floor(Math.random() * filteredData.length)];
                let choices = [];

                if (currentQuestionType === 'pallet') {
                    const isLayerQ = Math.random() > 0.5;
                    const layers = Math.floor(Math.random() * 4) + 1;
                    const correctVal = isLayerQ ? (correct.cpl * layers) : correct.cpp;

                    const wrongOption1 = correctVal + (correct.cpl || 10);
                    const wrongOption2 = Math.max(1, correctVal - (correct.cpl || 5));
                    const wrongOption3 = Math.round(correctVal * (Math.random() > 0.5 ? 1.5 : 0.5));

                    choices = [
                        { id: 1, val: correctVal, isCorrect: true },
                        { id: 2, val: wrongOption1, isCorrect: false },
                        { id: 3, val: wrongOption2, isCorrect: false },
                        { id: 4, val: wrongOption3, isCorrect: false }
                    ].sort(() => Math.random() - 0.5);

                    setCurrentQ({ ...correct, qTitle: isLayerQ ? `${layers} Layers of ${correct.name}` : `Full Pallet: ${correct.name}` });
                } else {
                    choices = [correct];
                    while (choices.length < 4) {
                        const random = PRODUCT_DATA[Math.floor(Math.random() * PRODUCT_DATA.length)];
                        if (!choices.find(c => c.id === random.id)) choices.push(random);
                    }
                    choices = choices.sort(() => Math.random() - 0.5);
                    setCurrentQ(correct);
                }

                setOptions(choices);
                setFeedback(null);
                setIsAnswering(false);
                setTimeLeft(100);
            };

            useEffect(() => { generateQuestion(); }, []);

            useEffect(() => {
                if (timeLeft > 0 && !isAnswering) {
                    const timer = setTimeout(() => setTimeLeft(prev => prev - difficulty.decay), 100);
                    return () => clearTimeout(timer);
                } else if (timeLeft <= 0) {
                    handleAnswer(null);
                }
            }, [timeLeft, isAnswering, difficulty]);

            const handleAnswer = (choice) => {
                if (isAnswering) return;
                setIsAnswering(true);
                setTotal(prev => prev + 1);

                const isCorrect = internalGameType === 'pallet' ? (choice && choice.isCorrect) : (choice && choice.id === currentQ.id);

                if (isCorrect) {
                    const basePoints = 10 * difficulty.multiplier;
                    const speedBonus = Math.round((timeLeft / 10) * difficulty.multiplier);
                    const streakBonus = Math.floor(streak / 2) * difficulty.multiplier;
                    setScore(prev => Math.round(prev + basePoints + speedBonus + streakBonus));
                    setStreak(prev => prev + 1);
                    setFeedback('correct');
                } else {
                    setStreak(0);
                    setFeedback('wrong');
                }

                setTimeout(() => {
                    const limit = type === 'marathon' ? marathonSettings.numQuestions : 10;
                    if (total + 1 >= limit) {
                        onFinish();
                    } else {
                        generateQuestion();
                    }
                }, 800);
            };

            if (!currentQ) return null;

            return (
                <div className={`space-y-6 ${feedback === 'wrong' ? 'animate-shake' : ''}`}>
                    <div className="flex justify-between items-center px-2">
                        <div className="flex flex-col text-slate-500 dark:text-slate-400 uppercase font-black text-[10px] tracking-widest">
                            <span className="text-red-500 font-black tracking-tighter">{difficulty.name} Mode / {category}</span>
                            <span className="text-slate-900 dark:text-white text-lg">{type === 'marathon' ? `${total + 1} / ${marathonSettings.numQuestions}` : `${total + 1} / 10`}</span>
                        </div>
                        <div className="text-right flex flex-col font-black">
                            <span className="text-slate-500 dark:text-slate-400 text-[10px] tracking-widest uppercase">Points</span>
                            <span className="text-2xl text-slate-900 dark:text-white">{score}</span>
                        </div>
                    </div>

                    <div className="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden border border-slate-300 dark:border-slate-700 shadow-inner">
                        <div
                            className={`timer-bar h-full ${timeLeft < 30 ? 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-green-500'}`}
                            style={{ width: `${timeLeft}%` }}
                        ></div>
                    </div>

                    <div className={`p-8 rounded-[2.5rem] text-center border-2 flex flex-col items-center justify-center min-h-[300px] transition-all duration-300 bg-slate-100/70 dark:bg-slate-800/70 backdrop-blur-xl shadow-2xl ${feedback === 'correct' ? 'border-green-500 bg-green-500/10 animate-pulse-green' :
                        feedback === 'wrong' ? 'border-red-500 bg-red-500/10' : 'border-slate-700 shadow-2xl'
                        }`}>
                        {internalGameType === 'recognition' && <img src={currentQ.image} className="product-image mb-4" />}
                        {internalGameType === 'mastery' && <h2 className="text-3xl font-black uppercase tracking-tighter italic leading-tight">{currentQ.name}</h2>}
                        {internalGameType === 'pallet' && (
                            <div className="p-3 bg-slate-200/50 dark:bg-slate-900/50 rounded-2xl border border-slate-300 dark:border-slate-700 w-full">
                                <h2 className="text-xl font-black uppercase tracking-tight leading-tight">{currentQ.qTitle}</h2>
                            </div>
                        )}
                        {streak > 2 && <div className="mt-4 bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] font-black animate-bounce shadow-lg shadow-orange-500/30 tracking-widest uppercase">🔥 {streak} Streak</div>}
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        {options.map((opt, i) => (
                            <button
                                key={i}
                                onClick={() => handleAnswer(opt)}
                                disabled={isAnswering}
                                className={`p-4 rounded-3xl font-black text-xs leading-tight border-2 transition-all min-h-[80px] shadow-lg active:translate-y-1 ${isAnswering && (internalGameType === 'pallet' ? opt.isCorrect : opt.id === currentQ.id)
                                    ? 'bg-green-500 border-green-400 text-white scale-105 z-10'
                                    : isAnswering && feedback === 'wrong' ? 'bg-slate-100 dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-400 dark:text-slate-700'
                                        : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700 text-slate-800 dark:text-slate-200 hover:border-slate-400 dark:hover:border-slate-500 active:bg-slate-200 dark:active:bg-slate-700'
                                    }`}
                            >
                                {internalGameType === 'pallet' ? opt.val : (internalGameType === 'recognition' ? opt.name : opt.code)}
                            </button>
                        ))}
                    </div>
                </div>
            );
        };

        const Results = ({ score, total, highScore, onRestart, onMenu }) => (
            <div className="text-center space-y-6 animate-in zoom-in duration-300 pb-10">
                <div className="p-10 rounded-[3.5rem] shadow-2xl relative overflow-hidden bg-slate-100/70 dark:bg-slate-800/70 backdrop-blur-xl border border-slate-200 dark:border-slate-700">
                    <div className="absolute top-0 left-0 w-full h-1 coke-red shadow-[0_0_20px_#F40009]"></div>
                    <div className="text-7xl font-black mb-2 tracking-tighter shadow-sm">{score}</div>
                    <h2 className="text-xl font-black mb-6 uppercase tracking-widest italic text-slate-500 dark:text-slate-400">Session Score</h2>
                    <div className="grid grid-cols-2 gap-4 border-t border-slate-300/50 dark:border-slate-700/50 pt-6">
                        <div><p className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Record</p><p className="text-xl font-black">{highScore}</p></div>
                        <div><p className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Status</p><p className="text-xl font-black italic text-red-500">PRO</p></div>
                    </div>
                </div>
                <button onClick={onRestart} className="w-full coke-red text-white p-5 rounded-[2rem] font-black text-xl shadow-xl shadow-red-500/20 hover:scale-[1.02] transition-transform">NEXT DRILL</button>
                <button onClick={onMenu} className="w-full bg-slate-200 dark:bg-slate-800 p-5 rounded-[2rem] font-bold text-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-300 dark:hover:bg-slate-700">HQ DASHBOARD</button>
            </div>
        );

        const About = ({ onBack }) => (
            <div className="animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-6 pb-10">
                <div className="p-8 rounded-[2.5rem] shadow-2xl bg-slate-100/70 dark:bg-slate-800/70 backdrop-blur-xl border border-slate-200 dark:border-slate-700">
                    <h2 className="text-2xl font-black mb-4 flex items-center gap-2 uppercase tracking-tighter leading-none">
                        <i className="fas fa-shield-alt text-red-500"></i>
                        Mission Objective
                    </h2>
                    <p className="text-slate-600 dark:text-slate-300 text-sm leading-relaxed mb-6 font-medium">
                        The CCBSA Picking Accelerator is an industrial training suite built to transform warehouse throughput.
                        By digitizing tribal knowledge and SKU configurations, we enable every picker to perform at an elite level from day one.
                    </p>
                    <div className="pt-6 border-t border-slate-300 dark:border-slate-700 flex flex-col items-center">
                        <p className="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-[0.3em] font-black mb-1">Architected & Engineered by</p>
                        <p className="text-lg font-black uppercase tracking-tighter leading-none">Asemahle Nkwali</p>
                        <p className="text-[10px] text-red-500 mt-2 font-bold tracking-widest uppercase italic">Optimizing for the right and more...</p>
                    </div>
                </div>
                <button onClick={onBack} className="w-full bg-slate-200 dark:bg-slate-800 p-5 rounded-3xl font-bold text-lg border border-slate-300 dark:border-slate-700 hover:bg-slate-300 dark:hover:bg-slate-700">BACK TO HQ</button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
